services:
  mcp:
    build:
      context: .
      target: mcp
      args:
        TINYCONTEXT_VERSION: local
    image: tinycontext:local
    ports:
      - "8000:8000"
    volumes:
      - tinycontext-data:/data
      - ./configs/context_config.json:/config/context_config.json:ro
    environment:
      TINYCONTEXT_CONFIG_PATH: /config/context_config.json
      TINYCONTEXT_MEMORY_DB_PATH: /data/memories.db
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000

  fastapi:
    build:
      context: .
      target: fastapi
      args:
        TINYCONTEXT_VERSION: local
    image: tinycontext-fastapi:local
    profiles:
      - fastapi
    ports:
      - "8001:8000"
    volumes:
      - tinycontext-data:/data
      - ./configs/context_config.json:/config/context_config.json:ro
    environment:
      TINYCONTEXT_CONFIG_PATH: /config/context_config.json
      TINYCONTEXT_MEMORY_DB_PATH: /data/memories.db

volumes:
  tinycontext-data:
