name: tinycontext

services:
  tinycontext:
    image: marcellm01/tinycontext:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - data:/data
    environment:
      TINYCONTEXT_MEMORY_DB_PATH: /data/memories.db
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000

volumes:
  data:
